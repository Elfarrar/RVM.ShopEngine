name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rvm-shopengine-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
          VPS_SSH_KEY_B64: ${{ secrets.PROD_VPS_SSH_KEY_B64 }}
        run: |
          install -m 700 -d ~/.ssh
          KEY_FILE=~/.ssh/id_ed25519
          export KEY_FILE
          python - <<'PY'
          import base64, os, subprocess, sys
          from pathlib import Path
          raw = os.environ["VPS_SSH_KEY_B64"].strip().replace("\r", "")
          target = Path(os.environ["KEY_FILE"])
          candidates = []
          if raw: candidates.append(raw)
          if "\\n" in raw: candidates.append(raw.replace("\\n", "\n"))
          try:
              decoded = base64.b64decode("".join(raw.split()), validate=True).decode("utf-8")
              candidates.append(decoded)
          except Exception: pass
          for c in candidates:
              c = c.strip()
              if "BEGIN OPENSSH PRIVATE KEY" in c:
                  target.write_text(c if c.endswith("\n") else c + "\n", encoding="utf-8")
                  os.chmod(target, 0o600)
                  try:
                      subprocess.run(["ssh-keygen", "-y", "-f", str(target)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                      sys.exit(0)
                  except subprocess.CalledProcessError: continue
          sys.stderr.write("SSH key secret invalido.\n")
          sys.exit(1)
          PY
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync Source To Server
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
          VPS_USER: ${{ secrets.PROD_VPS_USER }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${VPS_PORT:-22}" -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          tar --exclude=.git --exclude=.github --exclude=bin --exclude=obj --exclude=.vs --exclude=.idea -czf - . | ssh -i ~/.ssh/id_ed25519 -p "${VPS_PORT:-22}" -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "tar -xzf - -C '${DEPLOY_PATH}'"

      - name: Build Environment File
        env:
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          API_KEY_0: ${{ secrets.PROD_API_KEY_0 }}
          API_APP_ID_0: ${{ secrets.PROD_API_APP_ID_0 }}
          API_APP_NAME_0: ${{ secrets.PROD_API_APP_NAME_0 }}
        run: |
          python - <<'PY'
          import os, sys
          from pathlib import Path
          required = ["POSTGRES_PASSWORD"]
          missing = [n for n in required if not os.environ.get(n)]
          if missing:
              sys.stderr.write("Secrets ausentes: " + ", ".join(missing) + "\n")
              sys.exit(1)
          keys = ["POSTGRES_PASSWORD", "API_KEY_0", "API_APP_ID_0", "API_APP_NAME_0"]
          content = "".join(f"{k}={os.environ.get(k, '')}\n" for k in keys)
          Path(".deploy.env").write_text(content, encoding="utf-8")
          PY

      - name: Sync Environment To Server
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
          VPS_USER: ${{ secrets.PROD_VPS_USER }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          cat .deploy.env | ssh -i ~/.ssh/id_ed25519 -p "${VPS_PORT:-22}" -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "cat > '${DEPLOY_PATH}/.env'"

      - name: Deploy On Server
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
          VPS_USER: ${{ secrets.PROD_VPS_USER }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${VPS_PORT:-22}" -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "cd '${DEPLOY_PATH}' && docker compose -f docker-compose.prod.yml up -d --build"

      - name: Verify Health
        run: |
          for attempt in {1..18}; do
            response="$(curl -fsS "https://infra.rvmxtech.com/shopengine/health" || true)"
            if echo "$response" | grep -q "Healthy"; then echo "$response"; exit 0; fi
            sleep 10
          done
          echo "$response"; exit 1

      - name: Dump Diagnostics On Failure
        if: failure()
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
          VPS_USER: ${{ secrets.PROD_VPS_USER }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${VPS_PORT:-22}" -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "cd '${DEPLOY_PATH}' && docker compose -f docker-compose.prod.yml ps && docker compose -f docker-compose.prod.yml logs --tail=200"
